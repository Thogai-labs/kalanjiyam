{% extends 'header-main-footer.html' %}

{% block meta_description -%}
A state-of-the-art Sanskrit proofreading platform with best-in-class OCR. Join today!
{%- endblock %}

{% block extra_head %}
<style>
/* ── Proofing shared styles ── */
.p-hero {
  background: linear-gradient(135deg, rgba(16,137,211,0.9) 0%, rgba(18,177,209,0.85) 100%);
  backdrop-filter: blur(12px);
  padding: 28px 32px 24px;
  margin-bottom: 28px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 24px rgba(16,137,211,0.2);
}
.p-card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255,255,255,0.8);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(16,137,211,0.1);
  padding: 24px;
  margin-bottom: 20px;
  transition: box-shadow 0.25s, transform 0.25s;
}
.p-card:hover { box-shadow: 0 12px 40px rgba(16,137,211,0.18); }
.p-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg,#1089d3,#12b1d1);
  color: white; font-weight: 700; font-size: 0.875rem;
  padding: 10px 22px; border-radius: 50px; border: none;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 6px 20px rgba(16,137,211,0.3);
  transition: all 0.2s ease;
}
.p-btn:hover { transform: scale(1.04); box-shadow: 0 10px 28px rgba(16,137,211,0.4); }
.p-btn:active { transform: scale(0.97); }
.p-btn-sm { padding: 7px 16px; font-size: 0.8rem; }
.p-btn-outline {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  color: #1089d3; font-weight: 600; font-size: 0.875rem;
  padding: 9px 20px; border-radius: 50px;
  border: 2px solid rgba(16,137,211,0.3); cursor: pointer; text-decoration: none;
  transition: all 0.2s ease;
}
.p-btn-outline:hover { background: rgba(16,137,211,0.08); border-color: #1089d3; transform: scale(1.03); }
.p-btn-danger {
  background: linear-gradient(135deg,#ef4444,#f87171);
  box-shadow: 0 6px 20px rgba(239,68,68,0.25);
}
.p-input {
  width: 100%; padding: 11px 16px;
  background: rgba(255,255,255,0.8);
  border: 1.5px solid rgba(16,137,211,0.2);
  border-radius: 14px; font-size: 0.875rem;
  outline: none; transition: all 0.2s;
  box-shadow: inset 0 2px 4px rgba(16,137,211,0.04);
}
.p-input:focus { border-color: #12b1d1; background: white; box-shadow: 0 0 0 3px rgba(18,177,209,0.15); }
.p-select {
  padding: 9px 14px; background: rgba(255,255,255,0.8);
  border: 1.5px solid rgba(16,137,211,0.2); border-radius: 14px;
  font-size: 0.875rem; outline: none; cursor: pointer; transition: all 0.2s;
}
.p-select:focus { border-color: #12b1d1; box-shadow: 0 0 0 3px rgba(18,177,209,0.15); }
.p-label { display: block; font-size: 0.75rem; font-weight: 700; color: #4a6a8a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.p-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(16,137,211,0.1); }
.p-table thead tr { background: linear-gradient(135deg,#1089d3,#12b1d1); }
.p-table th { color: white; padding: 12px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.p-table td { padding: 11px 16px; font-size: 0.875rem; border-bottom: 1px solid rgba(16,137,211,0.07); background: rgba(255,255,255,0.65); }
.p-table tbody tr:last-child td { border-bottom: none; }
.p-table tbody tr:hover td { background: rgba(16,137,211,0.04); }
.p-badge { display: inline-block; padding: 3px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; }
.p-badge-r0 { background: rgba(239,68,68,0.12); color: #991b1b; }
.p-badge-r1 { background: rgba(234,179,8,0.12); color: #854d0e; }
.p-badge-r2 { background: rgba(22,163,74,0.12); color: #166534; }
.p-badge-skip { background: rgba(100,116,139,0.12); color: #475569; }
.p-divider { border: none; border-top: 1px solid rgba(16,137,211,0.1); margin: 20px 0; }
.p-section-title { font-size: 1.1rem; font-weight: 700; color: #1089d3; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.p-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 0; border-bottom: 2px solid rgba(16,137,211,0.1); }
.p-tab { padding: 9px 18px; border-radius: 12px 12px 0 0; font-size: 0.85rem; font-weight: 600; text-decoration: none; color: #4a6a8a; transition: all 0.2s; border: 1.5px solid transparent; border-bottom: none; }
.p-tab:hover { background: rgba(16,137,211,0.07); color: #1089d3; }
.p-tab.active { background: linear-gradient(135deg,#1089d3,#12b1d1); color: white; box-shadow: 0 4px 12px rgba(16,137,211,0.25); }
.p-sidebar { background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,0.8); border-radius: 18px; padding: 18px; box-shadow: 0 4px 20px rgba(16,137,211,0.08); }
.p-sidebar-section { margin-bottom: 18px; }
.p-sidebar-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #8aabcc; margin-bottom: 8px; }
.p-sidebar-link { display: block; padding: 7px 10px; border-radius: 10px; font-size: 0.85rem; color: #4a6a8a; text-decoration: none; transition: all 0.18s; font-weight: 500; }
.p-sidebar-link:hover { background: rgba(16,137,211,0.08); color: #1089d3; }
.p-sidebar-link.active { background: linear-gradient(135deg,rgba(16,137,211,0.12),rgba(18,177,209,0.12)); color: #1089d3; font-weight: 700; }
.p-progress-bar { height: 8px; border-radius: 50px; background: rgba(16,137,211,0.1); overflow: hidden; }
.p-progress-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg,#1089d3,#12b1d1); transition: width 0.4s ease; }
.p-stat-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,0.8); border-radius: 18px; padding: 20px 24px; box-shadow: 0 4px 20px rgba(16,137,211,0.1); text-align: center; }
.p-stat-num { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg,#1089d3,#12b1d1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.p-stat-label { font-size: 0.78rem; color: #6a9abf; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
</style>
{% endblock %}

{% block main %}
<article class="p-4 xl:p-0 max-w-6xl mx-auto mb-24 mt-4">
{% block content %}{% endblock %}
</article>
{% endblock %}
