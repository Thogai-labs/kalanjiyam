<!DOCTYPE html>
<html lang="{{ get_locale() }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kalanjiyam{% endblock %}</title>
  <link rel="stylesheet" href="{{ asset('gen/style.css') }}">
  <style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #e8f4fd 0%, #f0f8ff 50%, #e0f2fe 100%);
    padding: 20px;
  }
  /* Decorative blobs */
  body::before {
    content: ''; position: fixed; top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(18,177,209,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -100px; left: -100px;
    width: 350px; height: 350px; border-radius: 50%;
    background: radial-gradient(circle, rgba(16,137,211,0.14) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Auth card */
  .auth-card {
    width: 100%; max-width: 400px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid rgba(255,255,255,0.8);
    border-radius: 32px;
    padding: 36px 40px;
    box-shadow: 0 20px 60px rgba(16,137,211,0.15), 0 4px 16px rgba(16,137,211,0.08);
    position: relative; z-index: 1;
  }
  .auth-logo { text-align: center; margin-bottom: 6px; font-size: 1.5rem; }
  .auth-heading { text-align: center; font-weight: 900; font-size: 1.6rem; color: #1089d3; margin-bottom: 4px; letter-spacing: -0.02em; }
  .auth-subheading { text-align: center; font-size: 0.85rem; color: #6a9abf; margin-bottom: 20px; }
  /* Inputs */
  .auth-input {
    width: 100%; padding: 13px 18px; margin-top: 12px;
    background: rgba(255,255,255,0.75);
    border: 1.5px solid rgba(16,137,211,0.18);
    border-radius: 50px;
    font-size: 0.9rem; color: #1a2a3a;
    outline: none; transition: all 0.2s ease;
    box-shadow: inset 0 2px 6px rgba(16,137,211,0.05);
  }
  .auth-input::placeholder { color: #a0bcd8; }
  .auth-input:focus {
    border-color: #12b1d1;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 0 0 4px rgba(18,177,209,0.15), inset 0 2px 6px rgba(16,137,211,0.05);
  }
  /* Button */
  .auth-btn {
    display: block; width: 100%; margin-top: 20px;
    padding: 14px; border-radius: 50px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #1089d3 0%, #12b1d1 100%);
    color: white; font-weight: 800; font-size: 0.95rem;
    box-shadow: 0 10px 28px rgba(16,137,211,0.38);
    transition: all 0.25s ease; letter-spacing: 0.02em;
  }
  .auth-btn:hover { transform: scale(1.03); box-shadow: 0 14px 36px rgba(16,137,211,0.48); }
  .auth-btn:active { transform: scale(0.97); }
  /* Links */
  .auth-forgot { display: block; text-align: right; margin-top: 8px; }
  .auth-forgot a { font-size: 0.78rem; color: #1089d3; text-decoration: none; font-weight: 600; }
  .auth-forgot a:hover { text-decoration: underline; }
  .auth-link { display: block; text-align: center; margin-top: 16px; }
  .auth-link a { font-size: 0.82rem; color: #1089d3; text-decoration: none; font-weight: 600; }
  .auth-link a:hover { text-decoration: underline; }
  .auth-agreement { display: block; text-align: center; margin-top: 14px; }
  .auth-agreement a { font-size: 0.72rem; color: #8aabcc; text-decoration: none; }
  /* Divider */
  .auth-divider { border: none; border-top: 1px solid rgba(16,137,211,0.12); margin: 18px 0; }
  /* Alerts */
  .auth-errors { background: rgba(254,226,226,0.8); border: 1px solid rgba(252,165,165,0.5); color: #991b1b; border-radius: 14px; padding: 11px 15px; margin-bottom: 12px; font-size: 0.82rem; }
  .auth-errors ul { margin: 0; padding-left: 16px; }
  .auth-success { background: rgba(220,252,231,0.8); border: 1px solid rgba(134,239,172,0.5); color: #166534; border-radius: 14px; padding: 11px 15px; margin-bottom: 12px; font-size: 0.82rem; }
  .auth-info { background: rgba(224,242,254,0.8); border: 1px solid rgba(125,211,252,0.5); color: #0c4a6e; border-radius: 14px; padding: 11px 15px; margin-bottom: 12px; font-size: 0.82rem; }
  /* Flash */
  .flashes { list-style: none; padding: 0; margin: 0 0 12px; }
  .flashes li { border-radius: 14px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 6px; }
  .flashes li.success { background: rgba(220,252,231,0.8); color: #166534; border: 1px solid rgba(134,239,172,0.5); }
  .flashes li.error, .flashes li.danger { background: rgba(254,226,226,0.8); color: #991b1b; border: 1px solid rgba(252,165,165,0.5); }
  .flashes li.info { background: rgba(224,242,254,0.8); color: #0c4a6e; border: 1px solid rgba(125,211,252,0.5); }
  .flashes li.warning { background: rgba(254,249,195,0.8); color: #854d0e; border: 1px solid rgba(253,224,71,0.5); }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
