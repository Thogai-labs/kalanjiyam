{% extends 'base-auth-form.html' %}
{% import "macros/forms.html" as mf %}

{% block title %}{{ _('Change password') }}{% endblock %}

{% block content %}
<form method="POST" class="form">
    {{ form.csrf_token }}
    <p class="title">{{ _('Set New Password') }}</p>
    <p class="message">{{ _('For user:') }} {{ username }}</p>

    <label>
      {{ form.password(class_="input", placeholder=" ") }}
      <span>{{ _('New Password') }}</span>
    </label> 

    <label>
      {{ form.confirm_password(class_="input", placeholder=" ") }}
      <span>{{ _('Confirm Password') }}</span>
    </label> 

    <button type="submit" class="submit">{{ _('Reset Password') }}</button>
</form>
{% endblock %}
