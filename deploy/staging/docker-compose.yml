version: '3.8'

services:
  kalanjiyam-web:
    image: ${KALANJIYAM_IMAGE}
    container_name: kalanjiyam-web
    ports:
      - host_ip: ${KALANJIYAM_HOST_IP}
        published: ${KALANJIYAM_HOST_PORT}
        target: 5000
    env_file:
      - ../../.env
    environment:
      - FLASK_ENV=${FLASK_ENV:-staging}
      - REDIS_URL=redis://kalanjiyam-redis:6379/0
      - SQLALCHEMY_DATABASE_URI=postgresql://kalanjiyam:kalanjiyam@kalanjiyam-db/kalanjiyam
      - OCR_BACKEND=remote
      - OCR_SERVICE_URL=${OCR_SERVICE_URL:-http://host.docker.internal:5001}
    depends_on:
      - kalanjiyam-db
      - kalanjiyam-redis

  kalanjiyam-db:
    image: postgres:15
    container_name: kalanjiyam-db
    environment:
      - POSTGRES_DB=kalanjiyam
      - POSTGRES_USER=kalanjiyam
      - POSTGRES_PASSWORD=kalanjiyam
    volumes:
      - kalanjiyam-data:/var/lib/postgresql/data

  kalanjiyam-redis:
    image: redis:7
    container_name: kalanjiyam-redis

  kalanjiyam-celery:
    image: ${KALANJIYAM_IMAGE}
    command: >
      celery -A kalanjiyam.tasks worker
      -Q default,ocr
      --loglevel=INFO
      --concurrency=2
      --prefetch-multiplier=1
    env_file:
      - ../../.env
    environment:
      - FLASK_ENV=${FLASK_ENV:-staging}
      - REDIS_URL=redis://kalanjiyam-redis:6379/0
      - SQLALCHEMY_DATABASE_URI=postgresql://kalanjiyam:kalanjiyam@kalanjiyam-db/kalanjiyam
      - OCR_BACKEND=remote
      - OCR_SERVICE_URL=${OCR_SERVICE_URL:-http://host.docker.internal:5001}
    depends_on:
      - kalanjiyam-db
      - kalanjiyam-redis

volumes:
  kalanjiyam-data:
