# Nginx location block for https://siddhasagaram.in/kalanjiyam
#
# Add this inside the existing `server { ... }` block for siddhasagaram.in.
# The kalanjiyam app listens on 127.0.0.1:5000 (set KALANJIYAM_HOST_PORT in .env).

upstream kalanjiyam_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

location /kalanjiyam {
    proxy_pass         http://kalanjiyam_app;
    proxy_redirect     off;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Allow large file uploads (PDFs, images)
    client_max_body_size 50M;

    # OCR tasks can be slow
    proxy_read_timeout   300;
    proxy_send_timeout   300;
    proxy_connect_timeout 60;
}

# Serve static files directly from disk for best performance.
# Mount the container's static dir to /srv/kalanjiyam/static on the host,
# or skip this block to let Gunicorn serve them.
